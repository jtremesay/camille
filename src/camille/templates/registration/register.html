{% extends "camille/base.html" %}

{% block title %}Sign up - Camille{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Sign up</h2>
        <p class="text-muted" style="text-align: center; margin-bottom: 1rem;">Registration is currently disabled.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width: 100%; opacity: 0.5; cursor: not-allowed;" disabled>Sign up</button>
            </div>
        </form>
    </div>
    <div class="auth-footer">
        Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
</div>
{% endblock %}
