{% extends "camille/base.html" %}

{% block title %}Sign in - Camille{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Sign in</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign in</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
