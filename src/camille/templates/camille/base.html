{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Camille{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'camille/css/style.css' %}">
</head>

<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="{% url 'home' %}" class="site-logo">
                <span class="logo-icon">C</span>
                Camille
            </a>
            <nav class="header-nav">
                {% if user.is_authenticated %}
                <a href="{% url 'home' %}">Dashboard</a>
                <a href="{% url 'logout_confirm' %}">Logout</a>
                {% else %}
                <a href="{% url 'login' %}" class="btn-sm">Sign in</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <a href="https://github.com/jtremesay/camille/">Source code</a> &middot; Licensed under <a href="https://www.gnu.org/licenses/agpl-3.0.html">AGPL-3.0</a>
        </div>
    </footer>
</body>

</html>
