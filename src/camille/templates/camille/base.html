{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camille</title>
</head>

<body>
    <header>
        <nav>
            {% if user.is_authenticated %}
            <a href="{% url 'logout_confirm' %}">Logout</a>
            {% else %}
            <a href="{% url 'login' %}">Sign in</a>
            <a href="{% url 'register' %}">Sign up</a>
            {% endif %}
        </nav>
        <h1><a href="{% url 'home' %}">Camille</a></h1>
    </header>

    <div>
        {% block content %}
        {% endblock %}
    </div>
</body>

</html>
