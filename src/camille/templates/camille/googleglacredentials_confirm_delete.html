{% extends "camille/base.html" %}

{% block title %}Delete Google GLA Credentials - Camille{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card delete-confirm">
        <div class="warning-icon">!</div>
        <h1>Delete Google GLA Credentials</h1>
        <p>Are you sure you want to delete your Google GLA API credentials?</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content: center;">
                <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-danger">Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
