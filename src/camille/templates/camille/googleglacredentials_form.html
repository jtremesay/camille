{% extends "camille/base.html" %}

{% block title %}{% if object %}Edit{% else %}Add{% endif %} Google GLA Credentials - Camille{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>{% if object %}Edit{% else %}Add{% endif %} Google GLA Credentials</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{% if object %}Update{% else %}Create{% endif %}</button>
                <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
