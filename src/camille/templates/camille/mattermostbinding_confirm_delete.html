{% extends "camille/base.html" %}

{% block content %}
<h2>Confirm unbind Mattermost account</h1>
    <p>Are you sure you want to unbind your Mattermost account <strong>{{ request.user.mm_binding.mm_id }}</strong> from
        your user account <strong>{{ request.user.username }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm unbind</button>
    </form>
    {% endblock %}
