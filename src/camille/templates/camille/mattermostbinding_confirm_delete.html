{% extends "camille/base.html" %}

{% block title %}Unbind Mattermost - Camille{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card delete-confirm">
        <div class="warning-icon">!</div>
        <h1>Unbind Mattermost</h1>
        <p>Are you sure you want to unlink your Mattermost account <strong>{{ request.user.mm_binding.mm_id }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-actions" style="justify-content: center;">
                <a href="{% url 'home' %}" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-danger">Unbind</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
