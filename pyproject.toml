[project]
name = "camille"
version = "5.0.0"
description = "An AI assistant for Mattermost"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "httpx-ws>=0.8.2",
]

[project.scripts]
camille = "camille.main:main"

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"
