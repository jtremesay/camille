[project]
name = "camille"
version = "0.1.0"
description = "An AI assistant for Mattermost"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "httpx-ws>=0.8.2",
    "logfire[httpx]>=4.16.0",
    "pydantic-ai-slim[anthropic,bedrock,tavily]>=1.26.0",
    "python-dotenv>=1.2.1",
]

[dependency-groups]
dev = ["ipython>=9.4.0"]

[build-system]
requires = ["uv_build>=0.9.15,<0.10.0"]
build-backend = "uv_build"
