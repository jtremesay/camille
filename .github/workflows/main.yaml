name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Install uv
        uses: astral-sh/setup-uv@v6
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      -
        name: Install dependencies
        run: uv sync --group test
      -
        name: Run tests
        env:
          SECRET_KEY: test-secret-key
          SECRET_KEY_FALLBACKS: ""
          SALT_KEY: test-salt-key
          DEBUG: "true"
        run: uv run pytest tests/

  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            killruana/camille
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=sha
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: killruana
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.ref == 'refs/heads/v6' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=killruana/camille:buildcache
          cache-to: type=registry,ref=killruana/camille:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/v6'
    steps:
      -
        name: Deploy
        uses: jtremesay/docker-swarm-deploy@main
        with:
          docker_username: killruana
          docker_password: ${{ secrets.DOCKERHUB_TOKEN }}
          remote_host: jtremesay.org
          remote_user: github-ci
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          stack_name: camille

