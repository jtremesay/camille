<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Camille - AI Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{% load static %}{% static 'camille/style.css' %}">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="nav-brand">
                    <h1>Camille</h1>
                </div>
                <div class="nav-links">
                    {% if user.is_authenticated %}
                    <span class="user-info">{{ user.username }}</span>
                    <a href="{% url 'camille:credentials_list' %}">Credentials</a>
                    <a href="{% url 'password_change' %}">Change Password</a>
                    <a href="{% url 'logout' %}">Logout</a>
                    {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message message-{{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Camille - AI Assistant for Mattermost</p>
        </div>
    </footer>
</body>

</html>
